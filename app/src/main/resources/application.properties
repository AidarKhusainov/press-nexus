# General
spring.application.name=app

# Database (PostgreSQL, R2DBC)
spring.r2dbc.url=r2dbc:postgresql://localhost:5432/pressnexus
spring.r2dbc.username=pressnexus
spring.r2dbc.password=${PRESS_DB_PASSWORD:}
spring.liquibase.change-log=classpath:/db/changelog/db.changelog-master.json
spring.liquibase.url=jdbc:postgresql://localhost:5432/pressnexus
spring.liquibase.user=pressnexus
spring.liquibase.password=${PRESS_DB_PASSWORD:}
spring.sql.init.mode=never

# HTTP Clients
http-client.clients.OLLAMA.base-url=http://localhost:11434/
http-client.clients.OLLAMA.timeout.connection=5m
http-client.clients.OLLAMA.timeout.read=5m
http-client.clients.OLLAMA.retry.max-attempts=10
http-client.clients.OLLAMA.retry.backoff=5s
http-client.clients.OLLAMA.retry.jitter=0.5

http-client.clients.NEWS.base-url=https://example.com
http-client.clients.NEWS.timeout.connection=1m
http-client.clients.NEWS.timeout.read=1m
http-client.clients.NEWS.retry.max-attempts=3
http-client.clients.NEWS.retry.backoff=1s
http-client.clients.NEWS.retry.jitter=0.5

http-client.clients.GEMINI.base-url=https://generativelanguage.googleapis.com/v1beta
http-client.clients.GEMINI.timeout.connection=60s
http-client.clients.GEMINI.timeout.read=5m
http-client.clients.GEMINI.retry.max-attempts=5
http-client.clients.GEMINI.retry.backoff=1s
http-client.clients.GEMINI.retry.jitter=0.5

http-client.clients.TELEGRAM.base-url=https://api.telegram.org
http-client.clients.TELEGRAM.timeout.connection=30s
http-client.clients.TELEGRAM.timeout.read=30s
http-client.clients.TELEGRAM.retry.max-attempts=3
http-client.clients.TELEGRAM.retry.backoff=1s
http-client.clients.TELEGRAM.retry.jitter=0.3

# Gemini
gemini.api-key=${GEMINI_API_KEY:}
gemini.model=gemini-1.5-flash

# Similarity And Clustering
similarity.min-score=0.60
similarity.top-n=5
similarity.cluster-min-score=0.70

# News Pipeline
press.news.pipeline.discovery-interval=10m
press.news.pipeline.worker-interval=30s
press.news.pipeline.claim-timeout=30m
press.news.pipeline.discovery-persist-concurrency=4
press.news.pipeline.fetch-source-concurrency=4
press.news.pipeline.content-batch-size=24
press.news.pipeline.embedding-batch-size=8
press.news.pipeline.summary-batch-size=8
press.news.pipeline.populate-concurrency=6
press.news.pipeline.embedding-concurrency=2
press.news.pipeline.summary-concurrency=2
press.news.pipeline.discovery-backlog-high-watermark=500

# Daily Brief Delivery
press.delivery.telegram.enabled=false
press.delivery.telegram.bot-token=${TELEGRAM_BOT_TOKEN:}
press.delivery.telegram.chat-ids=
press.delivery.telegram.interval=24h
press.delivery.telegram.lookback=24h
press.delivery.telegram.max-items=7
press.delivery.telegram.language=ru

# Ingress Security
press.security.internal-api.enabled=false
press.security.internal-api.api-key=${PRESS_API_KEY:}
press.security.telegram-webhook.secret-token=${TELEGRAM_WEBHOOK_SECRET_TOKEN:}

# Product Analytics Report
press.analytics.product-report.enabled=true
press.analytics.product-report.interval=24h

# Observability Logs And Metrics
logging.level.com.nexus.press.app=INFO
logging.level.reactor.netty=WARN
logging.level.org.springframework.web.reactive.function.client.ExchangeFunctions=WARN
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always
management.endpoint.health.probes.enabled=true
management.prometheus.metrics.export.enabled=true
management.tracing.enabled=true
management.tracing.sampling.probability=1.0
management.otlp.tracing.endpoint=http://localhost:4318/v1/traces
management.otlp.tracing.export.enabled=false
management.metrics.tags.application=${spring.application.name}
management.metrics.distribution.percentiles-histogram.press.pipeline.stage.duration=true
management.metrics.distribution.percentiles-histogram.press.http.client.duration=true
management.metrics.distribution.percentiles-histogram.press.jobs.duration=true
