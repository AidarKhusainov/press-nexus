spring.r2dbc.url=${PRESS_R2DBC_URL:r2dbc:postgresql://postgres:5432/pressnexus}
spring.r2dbc.username=${PRESS_DB_USER:pressnexus}
spring.r2dbc.password=${PRESS_DB_PASSWORD}
spring.liquibase.url=${PRESS_JDBC_URL:jdbc:postgresql://postgres:5432/pressnexus}
spring.liquibase.user=${PRESS_DB_USER:pressnexus}
spring.liquibase.password=${PRESS_DB_PASSWORD}

http-client.clients.OLLAMA.base-url=${OLLAMA_BASE_URL:http://ollama:11434/}

press.delivery.telegram.enabled=${PRESS_DELIVERY_TELEGRAM_ENABLED:false}
press.analytics.product-report.enabled=${PRESS_PRODUCT_REPORT_ENABLED:true}

press.security.internal-api.enabled=true
press.security.internal-api.api-key=${PRESS_API_KEY}
press.security.telegram-webhook.secret-token=${TELEGRAM_WEBHOOK_SECRET_TOKEN:}

management.endpoint.health.show-details=never
management.otlp.tracing.endpoint=${OTLP_TRACING_ENDPOINT:http://otel-collector:4318/v1/traces}
management.otlp.tracing.export.enabled=${PRESS_OTLP_TRACING_ENABLED:false}

server.forward-headers-strategy=framework
