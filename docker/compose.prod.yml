x-default-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  postgres:
    image: ${POSTGRES_IMAGE:-pgvector/pgvector:0.8.2-pg16-trixie}
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${PRESS_DB_USER:-pressnexus}
      POSTGRES_PASSWORD: ${PRESS_DB_PASSWORD:?Set PRESS_DB_PASSWORD}
      POSTGRES_DB: pressnexus
    expose:
      - "5432"
    volumes:
      - press-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PRESS_DB_USER:-pressnexus} -d pressnexus"]
      interval: 10s
      timeout: 5s
      start_period: 15s
      retries: 10
    security_opt:
      - no-new-privileges:true
    logging: *default-logging
    mem_limit: ${POSTGRES_MEMORY:-1g}
    cpus: ${POSTGRES_CPUS:-1.0}
    pids_limit: ${POSTGRES_PIDS_LIMIT:-256}
    shm_size: ${POSTGRES_SHM_SIZE:-256m}
    networks:
      - backend

  ollama:
    image: ${OLLAMA_IMAGE:-ollama/ollama:0.17.5}
    restart: unless-stopped
    environment:
      OLLAMA_KEEP_ALIVE: ${OLLAMA_KEEP_ALIVE:-24h}
      OLLAMA_NO_GPU: ${OLLAMA_NO_GPU:-1}
      OMP_NUM_THREADS: ${OLLAMA_THREADS:-6}
      OLLAMA_NUM_PARALLEL: ${OLLAMA_NUM_PARALLEL:-4}
    expose:
      - "11434"
    volumes:
      - press-ollama-data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      start_period: 20s
      retries: 10
    security_opt:
      - no-new-privileges:true
    logging: *default-logging
    mem_limit: ${OLLAMA_MEMORY:-8g}
    cpus: ${OLLAMA_CPUS:-6.0}
    pids_limit: ${OLLAMA_PIDS_LIMIT:-512}
    networks:
      - backend
      - egress

  ollama-model-init:
    image: ${OLLAMA_IMAGE:-ollama/ollama:0.17.5}
    restart: "no"
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      OLLAMA_HOST: ${OLLAMA_BASE_URL:-http://ollama:11434/}
    command: ["pull", "nomic-embed-text"]
    security_opt:
      - no-new-privileges:true
    logging: *default-logging
    networks:
      - backend
      - egress

  app:
    image: ${APP_IMAGE:?Set APP_IMAGE}
    restart: unless-stopped
    init: true
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_healthy
      ollama-model-init:
        condition: service_completed_successfully
    ports:
      - "${APP_BIND_ADDRESS:-127.0.0.1}:${APP_PORT:-8080}:8080"
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod}
      JAVA_TOOL_OPTIONS: ${JAVA_TOOL_OPTIONS:--XX:MaxRAMPercentage=75.0 -XX:+ExitOnOutOfMemoryError}
      LOG_DIR: /var/log/press-nexus
      PRESS_DB_USER: ${PRESS_DB_USER:-pressnexus}
      PRESS_DB_PASSWORD: ${PRESS_DB_PASSWORD:?Set PRESS_DB_PASSWORD}
      PRESS_R2DBC_URL: ${PRESS_R2DBC_URL:-r2dbc:postgresql://postgres:5432/pressnexus}
      PRESS_JDBC_URL: ${PRESS_JDBC_URL:-jdbc:postgresql://postgres:5432/pressnexus}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://ollama:11434/}
      PRESS_DELIVERY_TELEGRAM_ENABLED: ${PRESS_DELIVERY_TELEGRAM_ENABLED:-false}
      PRESS_API_KEY: ${PRESS_API_KEY:?Set PRESS_API_KEY}
      TELEGRAM_WEBHOOK_SECRET_TOKEN: ${TELEGRAM_WEBHOOK_SECRET_TOKEN:-}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:?Set GEMINI_API_KEY}
      PRESS_NEWS_PIPELINE_EMBEDDING_CONCURRENCY: ${PRESS_NEWS_PIPELINE_EMBEDDING_CONCURRENCY:-4}
      PRESS_OTLP_TRACING_ENABLED: ${PRESS_OTLP_TRACING_ENABLED:-false}
      OTLP_TRACING_ENDPOINT: ${OTLP_TRACING_ENDPOINT:-http://otel-collector:4318/v1/traces}
    volumes:
      - press-app-logs:/var/log/press-nexus
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,nodev,size=${APP_TMPFS_SIZE:-64m}
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    logging: *default-logging
    mem_limit: ${APP_MEMORY:-3g}
    cpus: ${APP_CPUS:-1.0}
    pids_limit: ${APP_PIDS_LIMIT:-256}
    stop_grace_period: ${APP_STOP_GRACE_PERIOD:-30s}
    networks:
      - backend
      - egress
      - monitoring

  prometheus:
    image: ${PROMETHEUS_IMAGE:-prom/prometheus:v3.10.0}
    restart: unless-stopped
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    ports:
      - "${PROMETHEUS_BIND_ADDRESS:-127.0.0.1}:${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus-data:/prometheus
    depends_on:
      app:
        condition: service_started
    security_opt:
      - no-new-privileges:true
    logging: *default-logging
    networks:
      - monitoring

  node-exporter:
    image: ${NODE_EXPORTER_IMAGE:-quay.io/prometheus/node-exporter:v1.8.2}
    restart: unless-stopped
    command:
      - --path.procfs=/host/proc
      - --path.sysfs=/host/sys
      - --path.rootfs=/host/root
      - --collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($|/)
    volumes:
      - type: bind
        source: /proc
        target: /host/proc
        read_only: true
      - type: bind
        source: /sys
        target: /host/sys
        read_only: true
      - type: bind
        source: /
        target: /host/root
        read_only: true
        bind:
          propagation: rslave
    security_opt:
      - no-new-privileges:true
    logging: *default-logging
    networks:
      - monitoring

  grafana:
    image: ${GRAFANA_IMAGE:-grafana/grafana:12.4}
    restart: unless-stopped
    ports:
      - "${GRAFANA_BIND_ADDRESS:-127.0.0.1}:${GRAFANA_PORT:-3000}:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:?Set GRAFANA_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/etc/grafana/dashboards:ro
    depends_on:
      prometheus:
        condition: service_started
      node-exporter:
        condition: service_started
      loki:
        condition: service_started
    security_opt:
      - no-new-privileges:true
    logging: *default-logging
    networks:
      - monitoring

  loki:
    image: ${LOKI_IMAGE:-grafana/loki:3.4.2}
    restart: unless-stopped
    command: -config.file=/etc/loki/config.yml
    ports:
      - "${LOKI_BIND_ADDRESS:-127.0.0.1}:${LOKI_PORT:-3100}:3100"
    volumes:
      - ./monitoring/loki/loki-config.yml:/etc/loki/config.yml:ro
      - loki-data:/loki
    security_opt:
      - no-new-privileges:true
    logging: *default-logging
    networks:
      - monitoring

  promtail:
    image: ${PROMTAIL_IMAGE:-grafana/promtail:3.4.2}
    restart: unless-stopped
    command: -config.file=/etc/promtail/config.yml
    volumes:
      - ./monitoring/promtail/promtail-config.yml:/etc/promtail/config.yml:ro
      - press-app-logs:/var/log/press-nexus:ro
      - promtail-data:/tmp
    depends_on:
      loki:
        condition: service_started
    security_opt:
      - no-new-privileges:true
    logging: *default-logging
    networks:
      - monitoring

volumes:
  press-postgres-data:
  press-ollama-data:
  press-app-logs:
  prometheus-data:
  grafana-data:
  loki-data:
  promtail-data:

networks:
  backend:
    internal: true
  egress:
  monitoring:
