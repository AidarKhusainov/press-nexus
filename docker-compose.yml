services:
  ollama-cpu:
    image: ollama/ollama:latest
    container_name: ollama_cpu
    ports:
      - "11434:11434"
    volumes:
      - ollama:/root/.ollama
    environment:
      OLLAMA_KEEP_ALIVE: 24h   # не выгружать модель
      OLLAMA_NO_GPU: "1"       # форсируем CPU
      OMP_NUM_THREADS: "8"     # подставь число физических ядер (например, 8)
    restart: unless-stopped

  ollama-gpu:
    image: ollama/ollama:latest
    container_name: ollama_gpu
    ports:
      - "11434:11434"
    volumes:
      - ollama:/root/.ollama
    environment:
      OLLAMA_KEEP_ALIVE: 24h         # чтобы модель не выгружалась
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all              # или 1
              capabilities: [gpu]
    restart: unless-stopped

  postgres:
    image: pgvector/pgvector:pg16
    container_name: pressnexus_postgres
    environment:
      POSTGRES_USER: pressnexus
      POSTGRES_PASSWORD: ${PRESS_DB_PASSWORD:?Set PRESS_DB_PASSWORD}
      POSTGRES_DB: pressnexus
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
#      - ./docker/postgres/initdb.d:/docker-entrypoint-initdb.d:ro
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    container_name: pressnexus_prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus-data:/prometheus
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    profiles: ["monitoring"]

  grafana:
    image: grafana/grafana:latest
    container_name: pressnexus_grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/etc/grafana/dashboards:ro
    depends_on:
      - prometheus
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    profiles: ["monitoring"]

  loki:
    image: grafana/loki:latest
    container_name: pressnexus_loki
    command: -config.file=/etc/loki/config.yml
    ports:
      - "3100:3100"
    volumes:
      - ./monitoring/loki/loki-config.yml:/etc/loki/config.yml:ro
      - loki-data:/loki
    restart: unless-stopped
    profiles: ["monitoring"]

  promtail:
    image: grafana/promtail:latest
    container_name: pressnexus_promtail
    command: -config.file=/etc/promtail/config.yml
    volumes:
      - ./monitoring/promtail/promtail-config.yml:/etc/promtail/config.yml:ro
      - ./logs:/var/log/press-nexus:ro
      - ./app/logs:/var/log/press-nexus-alt:ro
      - promtail-data:/tmp
    depends_on:
      - loki
    restart: unless-stopped
    profiles: ["monitoring"]

volumes:
  ollama:
  pgdata:
  prometheus-data:
  grafana-data:
  loki-data:
  promtail-data:
