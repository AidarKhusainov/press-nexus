server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: press-nexus-app-logs
    static_configs:
      - targets: [localhost]
        labels:
          job: press-nexus
          channel: app
          __path__: /var/log/press-nexus/app.log
      - targets: [localhost]
        labels:
          job: press-nexus
          channel: pipeline
          __path__: /var/log/press-nexus/pipeline.log
      - targets: [localhost]
        labels:
          job: press-nexus
          channel: integration
          __path__: /var/log/press-nexus/integration.log
      - targets: [localhost]
        labels:
          job: press-nexus
          channel: app
          __path__: /var/log/press-nexus-alt/app.log
      - targets: [localhost]
        labels:
          job: press-nexus
          channel: pipeline
          __path__: /var/log/press-nexus-alt/pipeline.log
      - targets: [localhost]
        labels:
          job: press-nexus
          channel: integration
          __path__: /var/log/press-nexus-alt/integration.log
    pipeline_stages:
      - json:
          expressions:
            ts: '"@timestamp"'
            level: level
            logger: logger_name
            thread: thread_name
            app: app
            flow: flowId
            news: newsId
            req: requestId
            message: message
      - timestamp:
          source: ts
          format: RFC3339
      - labels:
          level:
          app:
