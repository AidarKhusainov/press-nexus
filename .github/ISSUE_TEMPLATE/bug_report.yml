name: Bug Report
description: Report a defect with clear reproduction steps.
title: "bug: "
labels: ["bug"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What happened?
      description: Describe the actual behavior and expected behavior.
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Provide minimal deterministic steps.
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true

  - type: textarea
    id: impact
    attributes:
      label: Impact
      description: Who/what is affected? Severity?
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / stack traces
      description: Paste relevant logs/trace IDs/metrics links.

  - type: input
    id: version
    attributes:
      label: App version / commit
      placeholder: e.g. 0.1.0-SNAPSHOT / abc123
