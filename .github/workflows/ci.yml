name: CI

on:
  pull_request:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  JAVA_VERSION: "21"
  PRESS_DB_PASSWORD: pressnexus
  PRESS_TEST_DB_USER: pressnexus
  PRESS_TEST_DB_PASSWORD: pressnexus

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    services:
      postgres:
        image: pgvector/pgvector:0.8.2-pg16-trixie
        env:
          POSTGRES_USER: pressnexus
          POSTGRES_PASSWORD: pressnexus
          POSTGRES_DB: pressnexus
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U pressnexus -d pressnexus"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven

      - name: Run mandatory quality gates and tests
        run: ./mvnw -V -B -ntp clean verify -Ddb.tests=true

      - name: Upload test reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: verify-reports
          retention-days: 7
          path: |
            **/target/surefire-reports/**
            **/target/failsafe-reports/**
            **/target/site/jacoco/**

  publish-image:
    if: github.event_name == 'push' && github.ref_name == 'master'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: verify
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=sha,format=long,prefix=
            type=raw,value=prod,enable={{is_default_branch}}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./docker/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=press-nexus-image
          cache-to: type=gha,mode=max,scope=press-nexus-image
