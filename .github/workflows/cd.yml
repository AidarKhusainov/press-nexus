name: CD

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref to build and deploy
        required: false
        default: main

permissions:
  contents: read
  packages: write

concurrency:
  group: production-deploy
  cancel-in-progress: false

env:
  PROD_HOST: ${{ secrets.PROD_HOST }}
  PROD_PORT: ${{ secrets.PROD_PORT }}
  PROD_APP_DIR: /opt/press-nexus

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      ref: ${{ steps.vars.outputs.ref }}
    if: >
      github.event_name == 'workflow_dispatch' ||
      (
        github.event_name == 'workflow_run' &&
        github.event.workflow_run.conclusion == 'success' &&
        (
          github.event.workflow_run.head_branch == 'main' ||
          github.event.workflow_run.head_branch == 'master'
        )
      )
    steps:
      - name: Resolve ref
        id: vars
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "ref=${{ inputs.ref }}" >> "$GITHUB_OUTPUT"
          else
            echo "ref=${{ github.event.workflow_run.head_sha }}" >> "$GITHUB_OUTPUT"
          fi

  build-and-push:
    runs-on: ubuntu-latest
    needs: prepare
    outputs:
      image: ${{ steps.image.outputs.image }}
      prod-image: ${{ steps.image.outputs.prod-image }}
      revision: ${{ steps.image.outputs.revision }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.ref }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve image coordinates
        id: image
        run: |
          repo="$(echo "${GITHUB_REPOSITORY}" | tr '[:upper:]' '[:lower:]')"
          revision="$(git rev-parse HEAD)"
          echo "revision=${revision}" >> "$GITHUB_OUTPUT"
          echo "image=ghcr.io/${repo}:${revision}" >> "$GITHUB_OUTPUT"
          echo "prod-image=ghcr.io/${repo}:prod" >> "$GITHUB_OUTPUT"

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ steps.image.outputs.image }}
            ${{ steps.image.outputs.prod-image }}
          labels: |
            org.opencontainers.image.revision=${{ steps.image.outputs.revision }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}

  deploy-production:
    runs-on: ubuntu-latest
    needs:
      - prepare
      - build-and-push
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.ref }}

      - name: Create deploy bundle
        env:
          APP_IMAGE: ${{ needs.build-and-push.outputs.image }}
          PRESS_DB_USER: ${{ secrets.PRESS_DB_USER }}
          PRESS_DB_PASSWORD: ${{ secrets.PRESS_DB_PASSWORD }}
          PRESS_API_KEY: ${{ secrets.PRESS_API_KEY }}
          TELEGRAM_WEBHOOK_SECRET_TOKEN: ${{ secrets.TELEGRAM_WEBHOOK_SECRET_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PRESS_DELIVERY_TELEGRAM_ENABLED: ${{ secrets.PRESS_DELIVERY_TELEGRAM_ENABLED }}
          APP_BIND_ADDRESS: ${{ secrets.APP_BIND_ADDRESS }}
          APP_PORT: ${{ secrets.APP_PORT }}
          OLLAMA_THREADS: ${{ secrets.OLLAMA_THREADS }}
          JAVA_TOOL_OPTIONS: ${{ secrets.JAVA_TOOL_OPTIONS }}
        run: |
          umask 077
          mkdir -p .deploy
          cat > .deploy/.env <<EOF
          APP_IMAGE=${APP_IMAGE}
          SPRING_PROFILES_ACTIVE=prod
          PRESS_DB_USER=${PRESS_DB_USER:-pressnexus}
          PRESS_DB_PASSWORD=${PRESS_DB_PASSWORD}
          PRESS_API_KEY=${PRESS_API_KEY}
          TELEGRAM_WEBHOOK_SECRET_TOKEN=${TELEGRAM_WEBHOOK_SECRET_TOKEN}
          TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
          GEMINI_API_KEY=${GEMINI_API_KEY}
          PRESS_DELIVERY_TELEGRAM_ENABLED=${PRESS_DELIVERY_TELEGRAM_ENABLED:-false}
          PRESS_OTLP_TRACING_ENABLED=false
          OLLAMA_THREADS=${OLLAMA_THREADS:-4}
          APP_BIND_ADDRESS=${APP_BIND_ADDRESS:-127.0.0.1}
          APP_PORT=${APP_PORT:-8080}
          JAVA_TOOL_OPTIONS=${JAVA_TOOL_OPTIONS:--XX:MaxRAMPercentage=75.0}
          EOF
          cp deploy/docker-compose.prod.yml .deploy/docker-compose.prod.yml
          cp scripts/deploy-prod-stack.sh .deploy/deploy-prod-stack.sh
          tar -C .deploy -cf .deploy/deploy-bundle.tar .env docker-compose.prod.yml deploy-prod-stack.sh

      - name: Ensure target directory exists
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_SSH_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          port: ${{ secrets.PROD_PORT }}
          script: mkdir -p '${{ env.PROD_APP_DIR }}'

      - name: Upload deployment bundle
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_SSH_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          port: ${{ secrets.PROD_PORT }}
          source: .deploy/deploy-bundle.tar
          target: ${{ env.PROD_APP_DIR }}
          overwrite: true

      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1
        env:
          GHCR_USERNAME: ${{ secrets.PROD_GHCR_USERNAME }}
          GHCR_TOKEN: ${{ secrets.PROD_GHCR_TOKEN }}
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_SSH_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          port: ${{ secrets.PROD_PORT }}
          envs: GHCR_USERNAME,GHCR_TOKEN
          script: |
            tar -C '${{ env.PROD_APP_DIR }}' -xf '${{ env.PROD_APP_DIR }}/deploy-bundle.tar'
            rm -f '${{ env.PROD_APP_DIR }}/deploy-bundle.tar'
            chmod 600 '${{ env.PROD_APP_DIR }}/.env'
            chmod +x '${{ env.PROD_APP_DIR }}/deploy-prod-stack.sh'
            APP_DIR='${{ env.PROD_APP_DIR }}' GHCR_USERNAME="${GHCR_USERNAME}" GHCR_TOKEN="${GHCR_TOKEN}" '${{ env.PROD_APP_DIR }}/deploy-prod-stack.sh'
