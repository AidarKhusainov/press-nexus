name: CD

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed
  workflow_dispatch:
    inputs:
      image_tag:
        description: Image tag to deploy manually
        required: false
        default: prod

permissions:
  contents: read

concurrency:
  group: production-deploy
  cancel-in-progress: false

env:
  PROD_APP_DIR: /opt/press-nexus
  DEPLOY_REF: ${{ github.event_name == 'workflow_dispatch' && 'master' || github.event.workflow_run.head_sha }}
  DEPLOY_IMAGE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.image_tag || github.event.workflow_run.head_sha }}

jobs:
  deploy-production:
    if: >
      github.event_name == 'workflow_dispatch' ||
      (
        github.event_name == 'workflow_run' &&
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.head_branch == 'master'
      )
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ env.DEPLOY_REF }}

      - name: Resolve image reference
        id: image
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=${{ env.DEPLOY_IMAGE_TAG }}

      - name: Upload production compose file
        uses: appleboy/scp-action@v1.0.0
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_SSH_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          port: ${{ secrets.PROD_PORT }}
          source: docker/compose.prod.yml
          target: ${{ env.PROD_APP_DIR }}
          strip_components: 1

      - name: Upload ingress config
        uses: appleboy/scp-action@v1.0.0
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_SSH_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          port: ${{ secrets.PROD_PORT }}
          source: docker/Caddyfile.prod
          target: ${{ env.PROD_APP_DIR }}
          strip_components: 0

      - name: Upload monitoring config
        uses: appleboy/scp-action@v1.0.0
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_SSH_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          port: ${{ secrets.PROD_PORT }}
          source: monitoring
          target: ${{ env.PROD_APP_DIR }}

      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.4
        env:
          APP_IMAGE: ${{ steps.image.outputs.tags }}
          SPRING_PROFILES_ACTIVE: prod
          PRESS_DB_USER: ${{ vars.PRESS_DB_USER || 'pressnexus' }}
          PRESS_DB_PASSWORD: ${{ secrets.PRESS_DB_PASSWORD }}
          PRESS_API_KEY: ${{ secrets.PRESS_API_KEY }}
          TELEGRAM_WEBHOOK_SECRET_TOKEN: ${{ secrets.TELEGRAM_WEBHOOK_SECRET_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PRESS_DELIVERY_TELEGRAM_ENABLED: ${{ vars.PRESS_DELIVERY_TELEGRAM_ENABLED || 'false' }}
          PRESS_OTLP_TRACING_ENABLED: ${{ vars.PRESS_OTLP_TRACING_ENABLED || 'false' }}
          PRESS_PUBLIC_DOMAIN: ${{ vars.PRESS_PUBLIC_DOMAIN || 'press-nexus.censor-amoroso.com' }}
          APP_BIND_ADDRESS: ${{ vars.APP_BIND_ADDRESS || '127.0.0.1' }}
          APP_PORT: ${{ vars.APP_PORT || '8080' }}
          OLLAMA_THREADS: ${{ vars.OLLAMA_THREADS || '4' }}
          JAVA_TOOL_OPTIONS: ${{ vars.JAVA_TOOL_OPTIONS || '-XX:MaxRAMPercentage=75.0' }}
          PRESS_R2DBC_URL: ${{ vars.PRESS_R2DBC_URL }}
          PRESS_JDBC_URL: ${{ vars.PRESS_JDBC_URL }}
          OLLAMA_BASE_URL: ${{ vars.OLLAMA_BASE_URL }}
          OTLP_TRACING_ENDPOINT: ${{ vars.OTLP_TRACING_ENDPOINT }}
          POSTGRES_IMAGE: ${{ vars.POSTGRES_IMAGE }}
          OLLAMA_IMAGE: ${{ vars.OLLAMA_IMAGE }}
          CADDY_IMAGE: ${{ vars.CADDY_IMAGE }}
          NODE_EXPORTER_IMAGE: ${{ vars.NODE_EXPORTER_IMAGE }}
          PROMETHEUS_BIND_ADDRESS: ${{ vars.PROMETHEUS_BIND_ADDRESS || '127.0.0.1' }}
          PROMETHEUS_PORT: ${{ vars.PROMETHEUS_PORT || '9090' }}
          GRAFANA_BIND_ADDRESS: ${{ vars.GRAFANA_BIND_ADDRESS || '127.0.0.1' }}
          GRAFANA_PORT: ${{ vars.GRAFANA_PORT || '3000' }}
          GRAFANA_ADMIN_USER: ${{ vars.GRAFANA_ADMIN_USER || 'admin' }}
          GRAFANA_ADMIN_PASSWORD: ${{ secrets.GRAFANA_ADMIN_PASSWORD }}
          LOKI_BIND_ADDRESS: ${{ vars.LOKI_BIND_ADDRESS || '127.0.0.1' }}
          LOKI_PORT: ${{ vars.LOKI_PORT || '3100' }}
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_SSH_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          port: ${{ secrets.PROD_PORT }}
          envs: PROD_APP_DIR,APP_IMAGE,SPRING_PROFILES_ACTIVE,PRESS_DB_USER,PRESS_DB_PASSWORD,PRESS_API_KEY,TELEGRAM_WEBHOOK_SECRET_TOKEN,TELEGRAM_BOT_TOKEN,GEMINI_API_KEY,PRESS_DELIVERY_TELEGRAM_ENABLED,PRESS_OTLP_TRACING_ENABLED,PRESS_PUBLIC_DOMAIN,APP_BIND_ADDRESS,APP_PORT,OLLAMA_THREADS,JAVA_TOOL_OPTIONS,PRESS_R2DBC_URL,PRESS_JDBC_URL,OLLAMA_BASE_URL,OTLP_TRACING_ENDPOINT,POSTGRES_IMAGE,OLLAMA_IMAGE,CADDY_IMAGE,NODE_EXPORTER_IMAGE,PROMETHEUS_BIND_ADDRESS,PROMETHEUS_PORT,GRAFANA_BIND_ADDRESS,GRAFANA_PORT,GRAFANA_ADMIN_USER,GRAFANA_ADMIN_PASSWORD,LOKI_BIND_ADDRESS,LOKI_PORT
          script: |
            set -e
            cd "${PROD_APP_DIR}"
            echo "${{ secrets.PROD_GHCR_TOKEN }}" | docker login ghcr.io -u "${{ secrets.PROD_GHCR_USERNAME }}" --password-stdin
            docker compose -f compose.prod.yml pull app caddy
            docker compose -f compose.prod.yml up -d app caddy prometheus node-exporter grafana loki promtail
            docker compose -f compose.prod.yml restart caddy prometheus grafana loki promtail
            docker compose -f compose.prod.yml ps app caddy prometheus node-exporter grafana loki promtail
